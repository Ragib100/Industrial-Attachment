<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Edit Student</title>
</head>
<body>
<section class="py-4">
    <div class="card mx-auto" style="max-width: 600px;">
        <div class="card-body p-5">
            <div class="text-center mb-5">
                <div class="bg-warning bg-opacity-10 text-warning rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 80px; height: 80px;">
                    <i class="bi bi-pencil-square fs-2"></i>
                </div>
                <h3 class="fw-bold text-dark">Update Student</h3>
                <p class="font-monospace text-muted small" th:text="'System ID: ' + ${studentDTO.id}">ID: 1...</p>
            </div>
            
            <!-- Form binding back to the DTO. Note we use {id} in action URL to match the POST mapping -->
            <form th:action="@{/students/{id}/edit(id=${studentDTO.id})}" th:object="${studentDTO}" method="post">
                
                <input type="hidden" th:field="*{id}">
                
                <div class="mb-4">
                    <label for="name" class="form-label text-muted fw-bold small text-uppercase">Full Name</label>
                    <div class="input-group input-group-lg shadow-sm">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="name" th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid border-danger' : ''">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="email" class="form-label text-muted fw-bold small text-uppercase">Email Address</label>
                    <div class="input-group input-group-lg shadow-sm">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" id="email" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid border-danger' : ''">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                </div>

                <div class="mb-5">
                    <label for="dept" class="form-label text-muted fw-bold small text-uppercase">Department</label>
                    <div class="input-group input-group-lg shadow-sm">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-building text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="dept" th:field="*{dept}"
                               th:classappend="${#fields.hasErrors('dept')} ? 'is-invalid border-danger' : ''">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('dept')}" th:errors="*{dept}"></div>
                    </div>
                </div>

                <div class="d-flex justify-content-between pt-2 border-top">
                    <a th:href="@{/students}" class="btn btn-light px-4 py-2 text-secondary shadow-sm">
                        <i class="bi bi-x-circle me-1"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-warning px-4 py-2 shadow border-0 text-dark fw-bold">
                        <i class="bi bi-check-circle-fill me-1"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
