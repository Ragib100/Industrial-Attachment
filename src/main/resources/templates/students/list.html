<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Students List</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0 text-dark">Student List</h2>
            <p class="text-muted mb-0">Manage and view registered students.</p>
        </div>
        <a th:href="@{/students/create}" class="btn btn-primary shadow-sm">
            <i class="bi bi-person-plus-fill me-2"></i>Add Student
        </a>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(students)}" class="text-center py-5 bg-white rounded shadow-sm">
        <i class="bi bi-inbox text-muted" style="font-size: 4rem;"></i>
        <h4 class="mt-3 text-dark">No Students Found</h4>
        <p class="text-muted">There are currenty no students in the database.</p>
        <a th:href="@{/students/create}" class="btn btn-outline-primary mt-2">Get Started</a>
    </div>

    <!-- Data Table -->
    <div th:unless="${#lists.isEmpty(students)}" class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th class="ps-4">Student Name & Email</th>
                        <th>ID</th>
                        <th>Department</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                </thead>
                <tbody class="border-top-0">
                    <tr th:each="student : ${students}">
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                                    <i class="bi bi-person-fill fs-5"></i>
                                </div>
                                <div>
                                    <div class="fw-bold text-dark" th:text="${student.name}">John Doe</div>
                                    <div class="text-muted small" th:text="${student.email}">john@example.com</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="text-secondary small fw-medium font-monospace" th:text="${student.id}" style="max-width: 100px; display: inline-block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" th:title="${student.id}">1</span>
                        </td>
                        <td>
                            <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill border border-primary border-opacity-25" th:text="${student.dept}">CS</span>
                        </td>
                        <td class="text-end pe-4">
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/students/{id}(id=${student.id})}" class="btn btn-sm btn-light text-primary border shadow-sm" title="View details">
                                    <i class="bi bi-eye-fill"></i>
                                </a>
                                <a th:href="@{/students/{id}/edit(id=${student.id})}" class="btn btn-sm btn-light text-warning border shadow-sm" title="Edit student">
                                    <i class="bi bi-pencil-fill"></i>
                                </a>
                                
                                <!-- Delete uses a form to send a POST request -->
                                <form th:action="@{/students/{id}/delete(id=${student.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this student permanently?');">
                                    <button type="submit" class="btn btn-sm btn-light text-danger border shadow-sm" title="Remove student">
                                        <i class="bi bi-trash-fill"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
